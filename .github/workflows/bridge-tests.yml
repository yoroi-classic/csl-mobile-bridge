name: Bridge tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '.github/dependabot.yml'
      - '.github/workflows/**'
      - '.nvmrc'
      - '.yarn/**'
      - '.yarnrc.yml'
      - 'android/**'
      - 'babel.config.js'
      - 'cpp/**'
      - 'example/package.json'
      - 'ios/**'
      - 'package.json'
      - 'README.md'
      - 'react-native.config.js'
      - 'rust/**'
      - 'src/**'
      - 'tsconfig*.json'
      - 'yoroi-classic-csl-mobile-bridge.podspec'
      - 'yarn.lock'

permissions:
  contents: read

jobs:
  checks:
    name: Bridge tests and package checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Install JavaScript dependencies
        run: node .yarn/releases/yarn-3.6.1.cjs install --immutable

      - name: Run bridge verification
        run: node .yarn/releases/yarn-3.6.1.cjs verify
