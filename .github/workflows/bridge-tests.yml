name: Bridge tests

on:
  pull_request:
    paths:
      - '.github/workflows/bridge-tests.yml'
      - '.yarn/**'
      - '.yarnrc.yml'
      - 'android/**'
      - 'babel.config.js'
      - 'cpp/**'
      - 'ios/**'
      - 'package.json'
      - 'react-native.config.js'
      - 'rust/**'
      - 'src/**'
      - 'tsconfig*.json'
      - 'yarn.lock'

permissions:
  contents: read

jobs:
  jest:
    name: Jest bridge tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install JavaScript dependencies
        run: node .yarn/releases/yarn-3.6.1.cjs install

      - name: Run bridge tests
        run: node .yarn/releases/yarn-3.6.1.cjs test --runInBand
