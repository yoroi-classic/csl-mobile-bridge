name: Bridge tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/dependabot.yml'
      - '.github/workflows/**'
      - '.nvmrc'
      - '.yarn/**'
      - '.yarnrc.yml'
      - 'android/**'
      - 'babel.config.js'
      - 'cpp/**'
      - 'emurgo-csl-mobile-bridge.podspec'
      - 'example/package.json'
      - 'ios/**'
      - 'package.json'
      - 'README.md'
      - 'react-native.config.js'
      - 'rust/**'
      - 'src/**'
      - 'tsconfig*.json'
      - 'yarn.lock'

permissions:
  contents: read

jobs:
  checks:
    name: Bridge tests and package checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install JavaScript dependencies
        run: node .yarn/releases/yarn-3.6.1.cjs install --immutable

      - name: Run bridge API tests
        run: node .yarn/releases/yarn-3.6.1.cjs test:ci

      - name: Run package checks
        run: node .yarn/releases/yarn-3.6.1.cjs check:package
