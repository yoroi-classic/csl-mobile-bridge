buildscript {
  ext.getExtOrDefault = {name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['CslMobileBridge_' + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["CslMobileBridge_" + name]).toInteger()
}

android {
  namespace "com.emurgo.cslmobilebridge"

  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      java.srcDirs += [
        "generated/java",
        "generated/jni"
      ]
    }
  }

  externalNativeBuild {
    cmake {
      path "../cpp/CMakeLists.txt"
    }
  }
}

task buildRust(type: Exec) {
  workingDir '../rust'
  commandLine 'cargo', 'build', '--target', 'aarch64-linux-android', '--release'
  commandLine 'cargo', 'build', '--target', 'armv7-linux-androideabi', '--release'
  commandLine 'cargo', 'build', '--target', 'i686-linux-android', '--release'
  commandLine 'cargo', 'build', '--target', 'x86_64-linux-android', '--release'
}

preBuild.dependsOn buildRust

repositories {
  mavenCentral()
  google()
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
}

react {
  jsRootDir = file("../src/")
  libraryName = "CslMobileBridge"
  codegenJavaPackageName = "com.emurgo.cslmobilebridge"
}
